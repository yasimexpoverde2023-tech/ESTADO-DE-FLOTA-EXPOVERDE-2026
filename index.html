<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISPONIBILIDAD DE FLOTA - EXPOVERDE 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2230;
  --surface3: #222d3a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #484f58;
  --green: #3fb950;
  --green-bg: rgba(63,185,80,0.12);
  --green-border: rgba(63,185,80,0.3);
  --red: #f85149;
  --red-bg: rgba(248,81,73,0.1);
  --red-border: rgba(248,81,73,0.3);
  --blue: #58a6ff;
  --blue-bg: rgba(88,166,255,0.1);
  --blue-border: rgba(88,166,255,0.3);
  --amber: #e3b341;
  --amber-bg: rgba(227,179,65,0.1);
  --amber-border: rgba(227,179,65,0.3);
  --accent: #238636;
  --accent2: #1f6feb;
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px 20px;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(35,134,54,0.15), transparent),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(31,111,235,0.08), transparent);
}

.container { max-width: 1500px; margin: auto; }

/* HEADER */
.header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  margin-bottom: 28px;
  gap: 16px;
}
.logo-wrap { display: flex; align-items: center; }
.logo-wrap img { max-height: 52px; max-width: 140px; object-fit: contain; filter: brightness(1.1); }
.header-center { text-align: center; }
.header-eyebrow {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--green);
  font-weight: 500;
  margin-bottom: 4px;
}
h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
}
.ultima-act-wrap { text-align: right; }
.ultima-act-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
#ultima-act {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text2);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 5px 10px;
  display: inline-block;
}
#ultima-act.error { color: var(--red); border-color: var(--red-border); }

/* DIVIDER */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
  margin-bottom: 24px;
}

/* KPIs */
.kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}
.kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
}
.kpi-total::before { background: linear-gradient(90deg, var(--blue), transparent); }
.kpi-disponibles::before { background: linear-gradient(90deg, var(--green), transparent); }
.kpi-vacios::before { background: linear-gradient(90deg, var(--red), transparent); }
.kpi-mendoza::before { background: linear-gradient(90deg, var(--amber), transparent); }
.kpi-num {
  font-size: 28px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  line-height: 1;
  margin-bottom: 4px;
}
.kpi-total .kpi-num { color: var(--blue); }
.kpi-disponibles .kpi-num { color: var(--green); }
.kpi-vacios .kpi-num { color: var(--red); }
.kpi-mendoza .kpi-num { color: var(--amber); }
.kpi-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }

/* FILTROS PANEL */
.filtros-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
}
.filtros-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text3);
  font-weight: 500;
  margin-bottom: 12px;
}
.filtros-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}

/* CUSTOM SELECT con buscador */
.custom-select-wrap {
  position: relative;
}
.custom-select-trigger {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 7px 30px 7px 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  cursor: pointer;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: border-color 0.2s, background 0.2s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
  user-select: none;
}
.custom-select-trigger:hover { border-color: var(--blue); background: var(--surface3); }
.custom-select-trigger.active { border-color: var(--blue); background: var(--surface3); }
.custom-select-trigger.has-value { border-color: var(--green); color: var(--green); }
.trigger-text { overflow: hidden; text-overflow: ellipsis; flex: 1; }
.trigger-arrow {
  width: 16px; height: 16px; flex-shrink: 0;
  transition: transform 0.2s;
  color: var(--text3);
}
.custom-select-trigger.active .trigger-arrow { transform: rotate(180deg); }

.custom-select-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  z-index: 1000;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden;
}
.custom-select-dropdown.open { display: block; }

.custom-select-search {
  width: 100%;
  background: var(--surface3);
  border: none;
  border-bottom: 1px solid var(--border);
  padding: 8px 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  outline: none;
}
.custom-select-search::placeholder { color: var(--text3); }

.custom-select-list {
  max-height: 200px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.custom-select-list::-webkit-scrollbar { width: 4px; }
.custom-select-list::-webkit-scrollbar-track { background: transparent; }
.custom-select-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.custom-option {
  padding: 7px 10px;
  font-size: 12px;
  cursor: pointer;
  color: var(--text2);
  transition: background 0.1s, color 0.1s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.custom-option:hover { background: var(--surface3); color: var(--text); }
.custom-option.selected { color: var(--green); background: var(--green-bg); }
.custom-option.hidden { display: none; }
.custom-option-none { color: var(--text3); font-style: italic; }

/* ACCIONES */
.acciones {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.3px;
}
.btn-limpiar {
  background: transparent;
  border-color: var(--red-border);
  color: var(--red);
}
.btn-limpiar:hover { background: var(--red-bg); }
.btn-imprimir {
  background: var(--surface);
  border-color: var(--border2);
  color: var(--text2);
}
.btn-imprimir:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }

.filtros-activos-info {
  margin-left: auto;
  font-size: 11px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}

/* TABLE */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--surface2); }
th {
  padding: 10px 12px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text3);
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 9px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
  transition: background 0.1s;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: rgba(255,255,255,0.03) !important; }

/* ROW COLORS — usando pseudoelemento para no pisar hover */
tr.disponible td { color: var(--text2); background: var(--green-bg); }
tr.disponible td:first-child { border-left: 3px solid var(--green); }
tr.vacio td { color: var(--text2); background: var(--red-bg); }
tr.vacio td:first-child { border-left: 3px solid var(--red); }
tr.cargado td { color: var(--text2); background: var(--blue-bg); }
tr.cargado td:first-child { border-left: 3px solid var(--blue); }
tr.mantenimiento td { color: var(--text2); background: var(--amber-bg); }
tr.mantenimiento td:first-child { border-left: 3px solid var(--amber); }

.badge-orden {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--surface3);
  border: 1px solid var(--green-border);
  color: var(--green);
  border-radius: 20px;
  padding: 2px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  min-width: 36px;
}
.col-orden { text-align: center; }

.table-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

/* LEYENDA */
.leyenda {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.leyenda-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  font-weight: 500;
}
.caja {
  width: 10px; height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.caja.disponible { background: var(--green); box-shadow: 0 0 6px rgba(63,185,80,0.5); }
.caja.vacio { background: var(--red); box-shadow: 0 0 6px rgba(248,81,73,0.5); }
.caja.cargado { background: var(--blue); box-shadow: 0 0 6px rgba(88,166,255,0.5); }
.caja.mantenimiento { background: var(--amber); box-shadow: 0 0 6px rgba(227,179,65,0.5); }

.row-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
}

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--text3);
  font-size: 13px;
}

/* LOADING */
.loading-bar {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  animation: loading 1.2s ease-in-out infinite;
  margin-bottom: 24px;
  border-radius: 1px;
  display: none;
}
.loading-bar.active { display: block; }
@keyframes loading {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

@media (max-width: 900px) {
  .kpis { grid-template-columns: repeat(2, 1fr); }
  .header { grid-template-columns: 1fr; text-align: center; }
  .logo-wrap { justify-content: center; }
  .ultima-act-wrap { text-align: center; }
}
@media (max-width: 500px) {
  .kpis { grid-template-columns: 1fr 1fr; }
}

@media print {
  body { background: white; color: black; padding: 10px; }
  .acciones, .filtros-panel, .loading-bar { display: none !important; }
  .table-wrap { border: 1px solid #ddd; }
  th { background: #1f2937 !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.disponible td { background: #d1fae5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.vacio td { background: #fee2e2 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.cargado td { background: #dbeafe !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  tr.mantenimiento td { background: #fef3c7 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .kpi { border: 1px solid #ddd !important; }
}
</style>
</head>
<body>
<div class="container">

  <div class="loading-bar active" id="loadingBar"></div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo-wrap">
      <img src="Logo___EXPOVERDE.png" alt="Expoverde">
    </div>
    <div class="header-center">
      <div class="header-eyebrow">Estado de Flota</div>
      <h1>EXPOVERDE 2026</h1>
    </div>
    <div class="ultima-act-wrap">
      <div class="ultima-act-label">Última modificación</div>
      <div id="ultima-act">Cargando…</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- KPIs -->
  <div class="kpis">
    <div class="kpi kpi-total">
      <div class="kpi-num" id="kpiTotalNum">—</div>
      <div class="kpi-label">Unidades totales</div>
    </div>
    <div class="kpi kpi-disponibles">
      <div class="kpi-num" id="kpiDispNum">—</div>
      <div class="kpi-label">Disponibles</div>
    </div>
    <div class="kpi kpi-vacios">
      <div class="kpi-num" id="kpiVacioNum">—</div>
      <div class="kpi-label">Vacíos</div>
    </div>
    <div class="kpi kpi-mendoza">
      <div class="kpi-num" id="kpiMendozaNum">—</div>
      <div class="kpi-label">Disp. Mendoza</div>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="filtros-panel">
    <div class="filtros-title">Filtros</div>
    <div class="filtros-grid" id="filtros"></div>
  </div>

  <!-- ACCIONES -->
  <div class="acciones">
    <button class="btn btn-limpiar" onclick="limpiarFiltros()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3l10 10M13 3L3 13"/></svg>
      Limpiar filtros
    </button>
    <button class="btn btn-imprimir" onclick="window.print()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="1" width="10" height="5" rx="1"/><rect x="1" y="6" width="14" height="6" rx="1"/><rect x="4" y="10" width="8" height="5" rx="1"/><circle cx="12" cy="9" r="1" fill="currentColor" stroke="none"/></svg>
      Imprimir vista actual
    </button>
    <span class="filtros-activos-info" id="filtrosInfo"></span>
  </div>

  <!-- TABLA -->
  <div class="table-wrap">
    <div class="table-container">
      <table>
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="table-footer">
      <div class="leyenda">
        <div class="leyenda-item"><div class="caja disponible"></div> Disponible</div>
        <div class="leyenda-item"><div class="caja vacio"></div> Vacío</div>
        <div class="leyenda-item"><div class="caja cargado"></div> Cargado</div>
        <div class="leyenda-item"><div class="caja mantenimiento"></div> Mantenimiento</div>
      </div>
      <div class="row-count" id="rowCount"></div>
    </div>
  </div>

</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1gvbQtOUJoM64tOn4uUBTI0cvpFa8EHOU/export?format=csv&gid=855031501";
const SHEET_ID  = "1gvbQtOUJoM64tOn4uUBTI0cvpFa8EHOU";
const ORDEN_COL = "ORDEN";

let datos = [];
let columnas = [];
let filtrosActivos = {};

/* ── FECHA REAL DE MODIFICACIÓN DEL SHEET ─────────────────────────────────── */
async function obtenerFechaModificacion() {
  try {
    // API pública de Google Drive para metadata (sin auth, funciona en archivos públicos)
    const metaUrl = `https://www.googleapis.com/drive/v3/files/${SHEET_ID}?fields=modifiedTime&key=AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY`;
    const r = await fetch(metaUrl);
    if (!r.ok) throw new Error();
    const data = await r.json();
    if (data.modifiedTime) {
      const d = new Date(data.modifiedTime);
      // Convertir a hora Argentina (UTC-3)
      const ar = new Date(d.getTime() - 3 * 60 * 60 * 1000);
      const pad = n => String(n).padStart(2,'0');
      document.getElementById("ultima-act").textContent =
        pad(ar.getUTCDate()) + '/' + pad(ar.getUTCMonth()+1) + '/' + ar.getUTCFullYear() +
        '  ' + pad(ar.getUTCHours()) + ':' + pad(ar.getUTCMinutes());
      return;
    }
  } catch(e) {}
  // Fallback: indicar que no se pudo obtener
  const el = document.getElementById("ultima-act");
  el.textContent = "No disponible";
  el.classList.add("error");
}

/* ── PARSEAR CSV (maneja comas dentro de comillas) ───────────────────────── */
function parseCSV(text) {
  return text.split("\n").map(f => {
    const row = [];
    let cur = "", inQ = false;
    for (let i = 0; i < f.length; i++) {
      const c = f[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { row.push(cur.trim()); cur = ""; continue; }
      cur += c;
    }
    row.push(cur.trim());
    return row;
  });
}

/* ── CARGAR DATOS ────────────────────────────────────────────────────────── */
async function cargar() {
  document.getElementById("loadingBar").classList.add("active");
  try {
    const res = await fetch(SHEET_URL + "&t=" + Date.now());
    const text = await res.text();
    const filas = parseCSV(text);

    columnas = filas[0].map(c => c.replace(/\r/g,'').trim());
    datos = filas.slice(1)
      .filter(f => f.some(c => c.trim()))
      .map(fila => {
        let obj = {};
        columnas.forEach((col, i) => obj[col] = (fila[i] || "").replace(/\r/g,'').trim());
        return obj;
      });

    columnas.forEach(col => { if (!(col in filtrosActivos)) filtrosActivos[col] = ""; });

    crearFiltros();
    aplicarFiltros();
  } catch(e) {
    document.getElementById("tbody").innerHTML =
      '<tr><td colspan="99" class="empty-state">Error al cargar datos del servidor.</td></tr>';
  }
  document.getElementById("loadingBar").classList.remove("active");
}

/* ── CUSTOM SELECT CON BUSCADOR ─────────────────────────────────────────── */
function crearCustomSelect(col, valores) {
  const wrap = document.createElement("div");
  wrap.className = "custom-select-wrap";
  wrap.dataset.col = col;

  const trigger = document.createElement("div");
  trigger.className = "custom-select-trigger" + (filtrosActivos[col] ? " has-value" : "");
  trigger.innerHTML = `
    <span class="trigger-text">${filtrosActivos[col] || col}</span>
    <svg class="trigger-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6l4 4 4-4"/></svg>
  `;

  const dropdown = document.createElement("div");
  dropdown.className = "custom-select-dropdown";

  const search = document.createElement("input");
  search.type = "text";
  search.className = "custom-select-search";
  search.placeholder = "Buscar " + col + "...";
  search.autocomplete = "off";

  const list = document.createElement("div");
  list.className = "custom-select-list";

  // Opción vacía (todos)
  const optNone = document.createElement("div");
  optNone.className = "custom-option custom-option-none" + (!filtrosActivos[col] ? " selected" : "");
  optNone.dataset.value = "";
  optNone.textContent = "Todos";
  list.appendChild(optNone);

  valores.forEach(v => {
    const opt = document.createElement("div");
    opt.className = "custom-option" + (filtrosActivos[col] === v ? " selected" : "");
    opt.dataset.value = v;
    opt.textContent = v;
    list.appendChild(opt);
  });

  dropdown.appendChild(search);
  dropdown.appendChild(list);
  wrap.appendChild(trigger);
  wrap.appendChild(dropdown);

  // Buscador filtra opciones
  search.addEventListener("input", () => {
    const q = search.value.toLowerCase();
    list.querySelectorAll(".custom-option:not(.custom-option-none)").forEach(opt => {
      opt.classList.toggle("hidden", !opt.textContent.toLowerCase().includes(q));
    });
  });

  // Click en opción
  list.addEventListener("click", e => {
    const opt = e.target.closest(".custom-option");
    if (!opt) return;
    const val = opt.dataset.value;
    filtrosActivos[col] = val;
    trigger.querySelector(".trigger-text").textContent = val || col;
    trigger.className = "custom-select-trigger" + (val ? " has-value" : "");
    list.querySelectorAll(".custom-option").forEach(o => o.classList.remove("selected"));
    opt.classList.add("selected");
    closeDropdown(wrap);
    aplicarFiltros();
  });

  // Abrir/cerrar
  trigger.addEventListener("click", e => {
    e.stopPropagation();
    const isOpen = dropdown.classList.contains("open");
    closeAllDropdowns();
    if (!isOpen) {
      dropdown.classList.add("open");
      trigger.classList.add("active");
      search.value = "";
      list.querySelectorAll(".custom-option").forEach(o => o.classList.remove("hidden"));
      setTimeout(() => search.focus(), 50);
    }
  });

  return wrap;
}

function closeDropdown(wrap) {
  wrap.querySelector(".custom-select-dropdown").classList.remove("open");
  wrap.querySelector(".custom-select-trigger").classList.remove("active");
}
function closeAllDropdowns() {
  document.querySelectorAll(".custom-select-dropdown.open").forEach(d => {
    d.classList.remove("open");
    d.closest(".custom-select-wrap").querySelector(".custom-select-trigger").classList.remove("active");
  });
}
document.addEventListener("click", closeAllDropdowns);
document.addEventListener("keydown", e => { if (e.key === "Escape") closeAllDropdowns(); });

/* ── CREAR FILTROS ───────────────────────────────────────────────────────── */
function crearFiltros() {
  const cont = document.getElementById("filtros");
  cont.innerHTML = "";
  columnas.forEach(col => {
    if (col === ORDEN_COL) return;
    const valores = [...new Set(datos.map(d => d[col]).filter(v => v))].sort();
    cont.appendChild(crearCustomSelect(col, valores));
  });
}

/* ── APLICAR FILTROS ─────────────────────────────────────────────────────── */
function aplicarFiltros() {
  let filtrados = datos;
  Object.keys(filtrosActivos).forEach(col => {
    if (filtrosActivos[col]) filtrados = filtrados.filter(d => d[col] === filtrosActivos[col]);
  });

  const esMendozaDisponible =
    (filtrosActivos["CLIENTE"] || "").includes("DISPONIBLE") &&
    (filtrosActivos["DESTINO"] || "") === "MENDOZA";

  if (esMendozaDisponible && columnas.includes(ORDEN_COL)) {
    filtrados = [...filtrados].sort((a, b) =>
      (parseInt(a[ORDEN_COL]) || 9999) - (parseInt(b[ORDEN_COL]) || 9999));
  }

  // Info filtros activos
  const activos = Object.values(filtrosActivos).filter(v => v).length;
  document.getElementById("filtrosInfo").textContent =
    activos > 0 ? activos + " filtro" + (activos > 1 ? "s" : "") + " activo" + (activos > 1 ? "s" : "") : "";

  actualizarKPIs(filtrados);
  render(filtrados, esMendozaDisponible);
}

/* ── KPIs ────────────────────────────────────────────────────────────────── */
function actualizarKPIs(data) {
  document.getElementById("kpiTotalNum").textContent = data.length;
  document.getElementById("kpiDispNum").textContent =
    data.filter(d => (d["CLIENTE"]||"").includes("DISPONIBLE")).length;
  document.getElementById("kpiVacioNum").textContent =
    data.filter(d => (d["CLIENTE"]||"").includes("VACIO")).length;
  document.getElementById("kpiMendozaNum").textContent =
    datos.filter(d => (d["CLIENTE"]||"").includes("DISPONIBLE") && (d["DESTINO"]||"") === "MENDOZA").length;
}

/* ── LIMPIAR FILTROS ─────────────────────────────────────────────────────── */
function limpiarFiltros() {
  Object.keys(filtrosActivos).forEach(k => filtrosActivos[k] = "");
  crearFiltros();
  aplicarFiltros();
}

/* ── RENDER TABLA ────────────────────────────────────────────────────────── */
function render(data, mostrarOrden) {
  const colsV = columnas.filter(c => c !== ORDEN_COL);

  let ths = colsV.map(c => `<th>${c}</th>`).join("");
  if (mostrarOrden && columnas.includes(ORDEN_COL)) ths += `<th>N° ORDEN</th>`;
  document.getElementById("thead").innerHTML = `<tr>${ths}</tr>`;

  if (data.length === 0) {
    document.getElementById("tbody").innerHTML =
      `<tr><td colspan="${colsV.length + (mostrarOrden ? 1 : 0)}" class="empty-state">No se encontraron registros con los filtros aplicados.</td></tr>`;
    document.getElementById("rowCount").textContent = "0 registros";
    return;
  }

  document.getElementById("tbody").innerHTML = data.map(row => {
    const cliente = (row["CLIENTE"] || "").toUpperCase();
    let clase = "cargado";
    if (cliente.includes("DISPONIBLE"))   clase = "disponible";
    else if (cliente.includes("VACIO"))   clase = "vacio";
    else if (cliente.includes("MANTENIMIENTO")) clase = "mantenimiento";

    let tds = colsV.map(c => `<td>${row[c] || ""}</td>`).join("");
    if (mostrarOrden && columnas.includes(ORDEN_COL)) {
      const n = parseInt(row[ORDEN_COL]);
      tds += `<td class="col-orden"><span class="badge-orden">${isNaN(n) ? "—" : n + "°"}</span></td>`;
    }
    return `<tr class="${clase}">${tds}</tr>`;
  }).join("");

  document.getElementById("rowCount").textContent = data.length + " registro" + (data.length !== 1 ? "s" : "");
}

/* ── INIT ────────────────────────────────────────────────────────────────── */
obtenerFechaModificacion();
cargar();
</script>
